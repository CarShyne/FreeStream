<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FreeStream Player</title>
<link href="https://fonts.googleapis.com/css2?family=Advent+Pro:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
video { width: 100%; height: 100%; object-fit: cover; display: block; }
#loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-family: 'Advent Pro', sans-serif; font-size: 16px;
    background: #000;
}
#close-btn {
    position: fixed; bottom: 80px; left: 24px; z-index: 999;
    width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.8); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; opacity: 0;
    transition: opacity 0.3s, background 0.2s;
}
body:hover #close-btn { opacity: 1; }
#close-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
</style>
</head>
<body>
<button id="close-btn" onclick="window.close()">✕</button>
<div id="loading">Preparing stream...</div>
<video id="player" controls autoplay playsinline x-webkit-airplay="allow"></video>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get('file');
const tvfile = params.get('tvfile');
const loading = document.getElementById('loading');
const player = document.getElementById('player');

async function startStream() {
    let target = tvfile || file;
    if (!target) return;

    let url;
    if (target.toLowerCase().endsWith('.mp4')) {
        url = tvfile ? 'http://192.168.0.121:3000/tv-media/' + tvfile
                     : 'http://192.168.0.121:3000/stream-mp4?file=' + encodeURIComponent(file);
    } else {
        const res = await fetch(tvfile ? '/start-stream?tvfile=' + tvfile
                                       : '/start-stream?file=' + encodeURIComponent(file));
        const data = await res.json();
        url = data.url;
    }

    // Force a standard resolution
    player.src = url;
    player.width = 1920;
    player.height = 1080;
    loading.style.display = 'none';

    // Attempt fullscreen on load
    player.requestFullscreen?.();
}

function stretchPlayer() {
    if (!player) return;
    player.style.width = '100vw';
    player.style.height = '100vh';
    player.style.objectFit = 'cover';
}

player.addEventListener('loadedmetadata', stretchPlayer);
player.addEventListener('play', stretchPlayer);

setInterval(() => {
    if (player && player.webkitDisplayingFullscreen) stretchPlayer();
}, 500);

// Chromecast / AirPlay auto-stretch
try {
    if (window.cast && cast.framework) {
        const context = cast.framework.CastContext.getInstance();
        context.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, (event) => {
            if(event.sessionState === cast.framework.SessionState.SESSION_STARTED ||
               event.sessionState === cast.framework.SessionState.SESSION_RESUMED){
                stretchPlayer();
                player.requestFullscreen?.();
            }
        });
    }
} catch(e){ console.warn('Cast not available', e); }

startStream();
</script>
</body>
</html>
