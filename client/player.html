<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FreeStream Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; display: block; }
        #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-family: sans-serif; font-size: 16px; background: #000; }
    </style>
</head>
<body>
<div id="loading">Preparing stream...</div>
<video id="player" controls autoplay x-webkit-airplay="allow"></video>
<script>
    const file = new URLSearchParams(window.location.search).get('file');
    const loading = document.getElementById('loading');
    const player = document.getElementById('player');

    async function startStream() {
        const tvfile = new URLSearchParams(window.location.search).get('tvfile');
        const target = tvfile || file;
        if (!target) return;

        if (target.toLowerCase().endsWith('.mp4')) {
            loading.style.display = 'none';
            if (tvfile) {
                player.src = 'http://192.168.0.121:3000/tv-media/' + tvfile;
            } else {
                player.src = 'http://192.168.0.121:3000/stream-mp4?file=' + encodeURIComponent(file);
            }
            return;
        }
        // MKV - use HLS
        const endpoint = tvfile ? '/start-stream?tvfile=' + tvfile : '/start-stream?file=' + encodeURIComponent(file);
        const res = await fetch(endpoint);
        const { url } = await res.json();
        loading.style.display = 'none';
        player.src = url;
    }

    startStream();
</script>
</body>
</html>
