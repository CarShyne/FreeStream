<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#0a0a0f">
<meta name="color-scheme" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FreeStream</title>
<link href="https://fonts.googleapis.com/css2?family=Advent+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0a0a0f; min-height:100vh; overscroll-behavior:none; font-family:'Advent Pro',sans-serif; color:#f0f0f0;}
    /* … all your existing CSS here unchanged … */
</style>
</head>
<body>

<header>
    <div class="logo">Free<span>Stream</span></div>
    <nav class="main-nav">
        <button class="nav-btn active" onclick="setSection('movies', this)">Movies</button>
        <button class="nav-btn" onclick="setSection('tvshows', this)">TV Shows</button>
    </nav>
    <div class="sort-wrap" id="sort-wrap">
        <button class="sort-btn" onclick="toggleSort(event)">
            Sort by <span id="sort-label">Title</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div class="sort-dropdown" id="sort-dropdown">
            <div class="sort-option active" onclick="selectSort('title-asc', 'Title')">Title</div>
            <div class="sort-option" onclick="selectSort('year-desc', 'Year')">Year</div>
            <div class="sort-option" onclick="selectSort('rating-desc', 'Rating')">Rating</div>
            <div class="sort-option" onclick="selectSort('year-asc', 'Oldest')">Oldest</div>
            <div class="sort-option" onclick="selectSort('added-desc', 'Last Added')">Last Added</div>
        </div>
    </div>
    <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Search your library...">
    </div>
    <button class="gear-btn" onclick="openSettings()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
</header>

<!-- Settings Modal & Grid / Modal content unchanged -->
<div id="settings-modal" style="display:none"> ... </div>
<div class="grid" id="grid"></div>
<div id="modal"> ... </div>

<!-- Hidden Video Player for playback & casting -->
<video id="player" controls autoplay x-webkit-airplay="allow" style="width:100vw;height:100vh;object-fit:cover;display:none;"></video>

<script src="app.js"></script>
<script>
// --- Patch: Force fullscreen & resolution for cast/airplay ---
const player = document.getElementById('player');
function forceFullScreenVideo() {
    if (!player || !player.src) return;
    player.style.width = '100vw';
    player.style.height = '100vh';
    player.style.objectFit = 'cover';
    if (player.videoWidth && player.videoHeight) {
        player.width = player.videoWidth;
        player.height = player.videoHeight;
    }
}
if (player) {
    player.addEventListener('loadedmetadata', forceFullScreenVideo);
}
setInterval(() => { if(player && player.webkitDisplayingFullscreen) forceFullScreenVideo(); }, 500);
try {
    if (window.cast && cast.framework) {
        const context = cast.framework.CastContext.getInstance();
        context.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, (event)=>{
            if(event.sessionState===cast.framework.SessionState.SESSION_STARTED||event.sessionState===cast.framework.SessionState.SESSION_RESUMED){
                forceFullScreenVideo();
            }
        });
    }
} catch(e){ console.warn('Cast not available', e); }
</script>
</body>
</html>
